name: Build and deploy to GitHub Pages (main / docs)

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages-main-docs
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build:pages
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_SITE_URL: https://buildwithmozi.github.io/Toys-Studio-Gallery

      - name: Copy build output to docs/
        run: |
          rm -rf docs
          mkdir -p docs
          cp -r out/. docs/
          # Jekyll bypass (GitHub Pages)
          touch docs/.nojekyll

      - name: Commit and push docs/ to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No changes in docs/ — skip commit"
            exit 0
          fi
          git commit -m "chore: deploy site to docs [skip ci]"
          git push
